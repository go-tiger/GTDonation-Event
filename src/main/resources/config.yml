config-version: 1.0

script-mode: true

chat-shooting:
  fireball-chance: 0.2

exp-bottle:
  min-count: 3
  max-count: 8

random-buff:
  duration-seconds: 60
  amplifier: 1
  # 서버에 등록된 모든 포션 효과 중 아래 목록에 없는 것만 랜덤 지급 후보가 됩니다.
  exclude-effects:
    - POISON
    - WITHER
    - BLINDNESS
    - NAUSEA
    - CONFUSION
    - HUNGER
    - WEAKNESS
    - SLOWNESS
    - SLOW
    - MINING_FATIGUE
    - SLOW_DIGGING
    - LEVITATION
    - UNLUCK
    - GLOWING
    - BAD_OMEN
    - DARKNESS
    - INFESTED
    - OOZING
    - RAID_OMEN
    - TRIAL_OMEN
    - WIND_CHARGED
    - INSTANT_DAMAGE
    - HARM

scarecrow:
  duration-seconds: 60
  food-material: CARROT
  food-count: 1

xray:
  radius: 8
  duration-seconds: 60
  # 감지할 광석 블록과 그 글로우 색상(ChatColor 이름)입니다.
  ores:
    COAL_ORE: BLACK
    DEEPSLATE_COAL_ORE: BLACK
    IRON_ORE: WHITE
    DEEPSLATE_IRON_ORE: WHITE
    COPPER_ORE: GOLD
    DEEPSLATE_COPPER_ORE: GOLD
    GOLD_ORE: YELLOW
    DEEPSLATE_GOLD_ORE: YELLOW
    REDSTONE_ORE: RED
    DEEPSLATE_REDSTONE_ORE: RED
    LAPIS_ORE: BLUE
    DEEPSLATE_LAPIS_ORE: BLUE
    DIAMOND_ORE: AQUA
    DEEPSLATE_DIAMOND_ORE: AQUA
    EMERALD_ORE: GREEN
    DEEPSLATE_EMERALD_ORE: GREEN
    NETHER_QUARTZ_ORE: LIGHT_PURPLE
    NETHER_GOLD_ORE: YELLOW
    ANCIENT_DEBRIS: DARK_RED

special-item:
  # 연출이 끝난 후 아이템 지급 방식: INVENTORY_FIRST(인벤토리 우선, 가득이면 드롭) / DROP_ONLY(무조건 드롭)
  drop-mode: INVENTORY_FIRST
  spin-seconds: 2
  candidates:
    - NETHERITE_INGOT
    - DIAMOND
    - EMERALD
    - GOLDEN_APPLE
    - ENCHANTED_GOLDEN_APPLE
    - NETHER_STAR
    - TOTEM_OF_UNDYING
    - ELYTRA

soul-out:
  duration-seconds: 30

devil-pickaxe:
  use-count: 20

diamond-zone:
  radius: 5
  duration-seconds: 30
  # 반경 내 고체 블록 중 다이아몬드 원석으로 변환될 확률 (0.0~1.0)
  convert-chance: 0.75

random-animal:
  radius: 1
  # org.bukkit.entity.Animals를 구현하는 동물 EntityType 중 아래 목록에 없는 것만 랜덤 소환 후보가 됩니다.
  exclude-entities: []

random-item:
  # 랜덤 지급 후보에서 제외할 아이템 목록입니다.
  exclude-items:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - COMMAND_BLOCK_MINECART
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
    - DEBUG_STICK
    - KNOWLEDGE_BOOK
    - SPAWNER
    - LIGHT
    - PETRIFIED_OAK_SLAB

monster-scan:
  radius: 20
  duration-seconds: 15

events:
  1000:
    action: BREAD
    target: player
  5000:
    action: BUFF
    target: random
  10000:
    action: DEBUFF
    target: all

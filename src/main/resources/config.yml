config-version: 1.0

script-mode: true

chat-shooting:
  fireball-chance: 0.2

exp-bottle:
  min-count: 3
  max-count: 8

random-buff:
  duration-seconds: 60
  amplifier: 1
  # 서버에 등록된 모든 포션 효과 중 아래 목록에 없는 것만 랜덤 지급 후보가 됩니다.
  exclude-effects:
    - POISON
    - WITHER
    - BLINDNESS
    - NAUSEA
    - CONFUSION
    - HUNGER
    - WEAKNESS
    - SLOWNESS
    - SLOW
    - MINING_FATIGUE
    - SLOW_DIGGING
    - LEVITATION
    - UNLUCK
    - GLOWING
    - BAD_OMEN
    - DARKNESS
    - INFESTED
    - OOZING
    - RAID_OMEN
    - TRIAL_OMEN
    - WIND_CHARGED
    - INSTANT_DAMAGE
    - HARM

scarecrow:
  duration-seconds: 60
  food-material: CARROT
  food-count: 1

xray:
  radius: 8
  duration-seconds: 60
  # 감지할 광석 블록과 그 글로우 색상(ChatColor 이름)입니다.
  ores:
    COAL_ORE: BLACK
    DEEPSLATE_COAL_ORE: BLACK
    IRON_ORE: WHITE
    DEEPSLATE_IRON_ORE: WHITE
    COPPER_ORE: GOLD
    DEEPSLATE_COPPER_ORE: GOLD
    GOLD_ORE: YELLOW
    DEEPSLATE_GOLD_ORE: YELLOW
    REDSTONE_ORE: RED
    DEEPSLATE_REDSTONE_ORE: RED
    LAPIS_ORE: BLUE
    DEEPSLATE_LAPIS_ORE: BLUE
    DIAMOND_ORE: AQUA
    DEEPSLATE_DIAMOND_ORE: AQUA
    EMERALD_ORE: GREEN
    DEEPSLATE_EMERALD_ORE: GREEN
    NETHER_QUARTZ_ORE: LIGHT_PURPLE
    NETHER_GOLD_ORE: YELLOW
    ANCIENT_DEBRIS: DARK_RED

special-item:
  # 연출이 끝난 후 아이템 지급 방식: INVENTORY_FIRST(인벤토리 우선, 가득이면 드롭) / DROP_ONLY(무조건 드롭)
  drop-mode: INVENTORY_FIRST
  spin-seconds: 2
  candidates:
    - NETHERITE_INGOT
    - DIAMOND
    - EMERALD
    - GOLDEN_APPLE
    - ENCHANTED_GOLDEN_APPLE
    - NETHER_STAR
    - TOTEM_OF_UNDYING
    - ELYTRA

soul-out:
  duration-seconds: 30

devil-pickaxe:
  use-count: 20

diamond-zone:
  radius: 5
  duration-seconds: 30
  # 반경 내 고체 블록 중 다이아몬드 원석으로 변환될 확률 (0.0~1.0)
  convert-chance: 0.75

random-animal:
  radius: 1
  # org.bukkit.entity.Animals를 구현하는 동물 EntityType 중 아래 목록에 없는 것만 랜덤 소환 후보가 됩니다.
  exclude-entities: []

weak-monster:
  radius: 3
  # 랜덤 소환 후보로 사용할 하급 몬스터 EntityType 목록입니다.
  candidates:
    - ZOMBIE
    - SKELETON
    - SPIDER
    - HUSK
    - DROWNED
    - SILVERFISH
    - CAVE_SPIDER

burn:
  duration-seconds: 5

lightning:
  # true면 실제 낙뢰 피해/화재를 입히고, false면 연출(소리/이펙트)만 재생합니다.
  deal-damage: true

tnt:
  # 폭발까지 걸리는 시간(틱, 20틱 = 1초)
  fuse-ticks: 80

firework:
  count: 1
  # 폭죽 크기(터지는 반경)
  power: 1

poke:
  # 랜덤 방향으로 밀려나는 수평 힘 (높이 변화 없음)
  strength: 1.0

random-scale:
  # 서버가 1.20.5 이상(GENERIC_SCALE 속성 지원)일 때만 동작합니다.
  duration-seconds: 30
  min-scale: 0.5
  max-scale: 2.0

frostbite:
  duration-seconds: 8
  # 1초마다 입는 피해량
  damage-per-tick: 1.0

medium-monster:
  radius: 4
  # 랜덤 소환 후보로 사용할 중급 몬스터 EntityType 목록입니다.
  candidates:
    - PILLAGER
    - VINDICATOR
    - EVOKER
    - WITCH
    - STRAY
    - CREEPER
    - ENDERMAN

random-item:
  # 랜덤 지급 후보에서 제외할 아이템 목록입니다.
  exclude-items:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - COMMAND_BLOCK_MINECART
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
    - DEBUG_STICK
    - KNOWLEDGE_BOOK
    - SPAWNER
    - LIGHT
    - PETRIFIED_OAK_SLAB

monster-scan:
  radius: 20
  duration-seconds: 15

absorption:
  duration-seconds: 60
  # 지급할 추가 체력(하트 단위, 1하트 = 체력 2)
  hearts: 4

knockback:
  # 랜덤 방향으로 밀려나는 수평 힘
  strength: 2.0
  # 위로 튀어오르는 힘
  upward: 1.2

events:
  1000:
    action: BREAD
    target: player
  5000:
    action: BUFF
    target: random
  10000:
    action: DEBUFF
    target: all

# DonationTarget.ALL / RANDOM 대상을 고를 때 제외할 조건입니다.
# PLAYER 대상(후원자 본인)에는 적용되지 않습니다.

exclusion:
  # 관전자 모드인 플레이어를 대상에서 제외
  exclude-spectator: true
  # 운영자(OP) 권한을 가진 플레이어를 대상에서 제외
  exclude-op: false
  # 특정 플레이어를 대상에서 제외 (UUID로 저장됩니다. 닉네임이 바뀌어도 유지됨)
  # /gtdonationevent ignore add|remove [플레이어] 명령어로 관리하세요.
  exclude-players: []
